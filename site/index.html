<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clash Legends Stats</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08101f;
      --panel: rgba(13, 19, 38, 0.78);
      --panel-strong: rgba(16, 23, 45, 0.94);
      --line: rgba(159, 176, 208, 0.16);
      --line-strong: rgba(114, 214, 255, 0.22);
      --text: #ecf2ff;
      --muted: #9fb0d0;
      --accent: #72d6ff;
      --accent-soft: rgba(114, 214, 255, 0.12);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(114, 214, 255, 0.12), transparent 26%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.11), transparent 24%),
        linear-gradient(180deg, #08101f 0%, #060b15 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero-card {
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: grid;
      gap: 14px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .hero-controls {
      display: grid;
      gap: 10px;
    }

    .hero-controls .controls {
      margin-bottom: 0;
      justify-self: end;
      width: 140px;
    }

    .hero-controls .controls select {
      min-height: 34px;
      padding: 0 10px;
      font-size: 0.9rem;
    }

    .hero-filters {
      display: grid;
      gap: 10px;
    }

    .filters-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    .filters-toggle strong {
      letter-spacing: -0.01em;
    }

    .filters-toggle .chevron {
      transition: transform 0.18s ease;
    }

    .filters-toggle[aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }

    .filters-panel[hidden] {
      display: none;
    }

    .hero-filters .filter-box {
      margin-bottom: 0;
    }

    .filter-switch {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .hero-top {
        flex-direction: column;
      }

      .hero-controls .controls {
        width: 100%;
        justify-self: start;
      }

      .filter-switch {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .left {
      padding: 14px;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .controls label {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .controls select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
      accent-color: var(--accent);
    }

    .controls select option {
      background: #0c1427;
      color: var(--text);
    }

    .controls select option:checked,
    .controls select option:focus {
      background: #12203a;
      color: var(--text);
    }

    .group-list {
      display: grid;
      gap: 8px;
    }

    .group-btn {
      text-align: left;
      border: 1px solid transparent;
      color: inherit;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .group-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.05);
    }

    .group-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }


    .group-title {
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .group-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .right {
      padding: 18px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .detail-title {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
    }

    .detail-sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .detail-count {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      margin-top: 4px;
    }

    .filter-box {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      gap: 12px;
    }

    .filter-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .filter-tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
    }

    .filter-tab.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .filter-pane.hidden {
      display: none;
    }

    .filter-pane {
      display: grid;
      gap: 8px;
    }

    .filter-pane input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }

    .filter-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      position: relative;
      z-index: 2;
    }

    .filter-tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
      pointer-events: auto;
    }

    .filter-tab.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .filter-pane {
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .filter-pane.hidden {
      display: none;
    }

    .filter-pane input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
      pointer-events: auto;
    }

    .search-results {
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
    }

    .search-result {
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    .search-result:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .search-result small {
      display: block;
      color: var(--muted);
      margin-top: 2px;
    }

    .army-block {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .army-chip {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.03);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }



    .equipment-filter {
      margin-top: 14px;
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
    }

    .equipment-filter-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .equipment-filter-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0;
    }

    .equipment-filter-clear {
      border: 0;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
      padding: 0;
    }

    .equipment-filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .equipment-pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font: inherit;
      font-size: 0.86rem;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .equipment-pill:hover {
      transform: translateY(-1px);
    }

    .equipment-pill.active {
      border-color: rgba(114, 214, 255, 0.8);
      background: rgba(114, 214, 255, 0.16);
      box-shadow: 0 0 0 1px rgba(114, 214, 255, 0.14);
    }

    .equipment-summary {
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 10px;
    }

    .army-chip strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .army-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 10px;
    }

    .army-link {
      display: block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .army-link:hover {
      text-decoration: underline;
    }

    .hero-line {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      overflow: hidden;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    tbody td {
      padding: 13px 10px;
      border-bottom: 1px solid rgba(159, 176, 208, 0.09);
      vertical-align: top;
    }

    .player-name {
      font-weight: 700;
    }

    .tag {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .army {
      color: #d9e7ff;
    }

    .loading, .error, .empty {
      padding: 18px 20px;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .left {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .topline {
        flex-direction: column;
      }

      table, thead, tbody, tr, td, th {
        display: block;
      }

      thead {
        display: none;
      }

      tbody td {
        border-bottom: 0;
        padding: 8px 0;
      }

      tbody tr {
        display: grid;
        gap: 8px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(159, 176, 208, 0.09);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero-card">
      <div class="hero-top">
        <div class="hero-controls">
          <div>
            <h1>Clash Legends Summary</h1>
            <p class="sub">Browse the most popular army groups from the top 200 Legends players.</p>
          </div>
        </div>
        <div class="controls">
          <label for="day-select">Day</label>
          <select id="day-select"></select>
        </div>
      </div>
      <div class="hero-filters">
        <button class="filters-toggle" id="filters-toggle" type="button" aria-expanded="false" aria-controls="filters-panel">
          <strong>Filters</strong>
          <span class="chevron">⌄</span>
        </button>
        <div class="filters-panel" id="filters-panel" hidden>
          <div class="filter-box">
            <div class="filter-switch">
              <button class="filter-tab active" id="filter-equipment-tab" type="button">Equipment</button>
              <button class="filter-tab" id="filter-player-tab" type="button">Player</button>
            </div>
            <div class="filter-pane" id="filter-equipment-pane">
              <div class="equipment-filter-header">
                <p class="equipment-filter-title">Owned equipment</p>
                <button class="equipment-filter-clear" id="equipment-clear" type="button">Clear</button>
              </div>
              <div class="equipment-filter-grid" id="equipment-filter-grid"></div>
              <div class="equipment-summary" id="equipment-summary">Select the equipment you own to glow matching armies.</div>
            </div>
            <div class="filter-pane hidden" id="filter-player-pane">
              <label for="player-search">Player search</label>
              <input id="player-search" type="search" placeholder="Search player name or tag">
              <div class="search-results" id="search-results"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="layout">
      <aside class="panel left">
        <div class="group-list" id="group-list"></div>
      </aside>

      <main class="panel right">
        <div class="topline">
          <div>
            <h2 class="detail-title" id="detail-title"></h2>
            <p class="detail-sub" id="detail-sub"></p>
          </div>
          <div class="detail-count" id="detail-count"></div>
        </div>
        <div class="army-block" id="army-block"></div>
        <div id="detail-body"></div>
      </main>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
  <script>
    const daySelect = document.getElementById('day-select');
    const filtersToggle = document.getElementById('filters-toggle');
    const filtersPanel = document.getElementById('filters-panel');
    const listEl = document.getElementById('group-list');
    const titleEl = document.getElementById('detail-title');
    const subEl = document.getElementById('detail-sub');
    const countEl = document.getElementById('detail-count');
    const bodyEl = document.getElementById('detail-body');
    const armyBlockEl = document.getElementById('army-block');
    const equipmentFilterGridEl = document.getElementById('equipment-filter-grid');
    const equipmentSummaryEl = document.getElementById('equipment-summary');
    const equipmentClearEl = document.getElementById('equipment-clear');
    const playerSearchEl = document.getElementById('player-search');
    const searchResultsEl = document.getElementById('search-results');
    const filterEquipmentTab = document.getElementById('filter-equipment-tab');
    const filterPlayerTab = document.getElementById('filter-player-tab');
    const filterEquipmentPane = document.getElementById('filter-equipment-pane');
    const filterPlayerPane = document.getElementById('filter-player-pane');

    const ownedEpicEquipment = new Set();
    let selectedPlayer = null;
    let filterMode = 'equipment';

    const EPIC_EQUIPMENT_GROUPS = [
      ['Giant Gauntlet', 'Spiky Ball', 'Snake Bracelet', 'Stick Horse'],
      ['Frozen Arrow', 'Magic Mirror', 'Action Figure', 'Monolith Arrow'],
      ['Dark Crown', 'Meteor Staff'],
      ['Fireball', 'Lavaloon Puppet', 'Heroic Torch'],
      ['Rocket Spear', 'Electro Boots', 'Frost Flake'],
      ['Rocket Backpack']
    ];

    const EPIC_EQUIPMENT = new Set(EPIC_EQUIPMENT_GROUPS.flat());

    const COMMON_EQUIPMENT = new Set([
      'Barbarian Puppet',
      'Rage Vial',
      'Archer Puppet',
      'Invisibility Vial',
      'Eternal Tome',
      'Life Gem',
      'Seeking Shield',
      'Royal Gem',
      'Earthquake Boots',
      'Hog Rider Puppet',
      'Vampstache',
      'Haste Vial',
      'Healing Tome',
      'Rage Gem',
      'Healer Puppet',
      'Noble Iron'
    ]);

    function isEpicEquipment(name) {
      return EPIC_EQUIPMENT.has(name) && !COMMON_EQUIPMENT.has(name);
    }

    function setFiltersOpen(open) {
      if (!filtersToggle || !filtersPanel) return;
      filtersToggle.setAttribute('aria-expanded', String(open));
      filtersPanel.hidden = !open;
    }

    function bindFiltersToggle() {
      if (!filtersToggle || !filtersPanel || filtersToggle.dataset.bound === '1') return;
      filtersToggle.dataset.bound = '1';
      filtersToggle.addEventListener('click', () => {
        setFiltersOpen(filtersPanel.hidden);
      });
    }
    const TROOP_HOUSING_SPACE = {
      "Apprentice Warden": 20,
      "Archer": 1,
      "Azure Dragon": 40,
      "Baby Dragon": 10,
      "Balloon": 5,
      "Barbarian": 1,
      "Barbarian Kicker": 12,
      "Battle Ram": 4,
      "Bowler": 6,
      "Broom Witch": 20,
      "Dragon": 20,
      "Dragon Rider": 25,
      "Druid": 16,
      "Electro Dragon": 30,
      "Electro Titan": 32,
      "Firecracker": 10,
      "Furnace": 18,
      "Giant": 5,
      "Giant Skeleton": 20,
      "Giant Thrower": 15,
      "Goblin": 1,
      "Golem": 30,
      "Headhunter": 6,
      "Healer": 14,
      "Hog Rider": 5,
      "Ice Golem": 15,
      "Ice Hound": 40,
      "Inferno Dragon": 15,
      "Lava Hound": 30,
      "Meteor Golem": 40,
      "Miner": 6,
      "Minion": 2,
      "P.E.K.K.A": 25,
      "Party Wizard": 4,
      "Pumpkin Barbarian": 1,
      "Rocket Balloon": 8,
      "Root Rider": 20,
      "Ruin Witch": 26,
      "Skeleton Barrel": 5,
      "Sky Wagon": 1,
      "Sneaky Goblin": 3,
      "Super Archer": 12,
      "Super Barbarian": 5,
      "Super Bowler": 30,
      "Super Dragon": 40,
      "Super Giant": 10,
      "Super Hog Rider": 12,
      "Super Miner": 24,
      "Super Minion": 12,
      "Super Valkyrie": 20,
      "Super Wall Breaker": 8,
      "Super Witch": 40,
      "Super Wizard": 10,
      "Super Yeti": 35,
      "Thrower": 16,
      "Valkyrie": 8,
      "Wall Breaker": 2,
      "Witch": 12,
      "Wizard": 4,
      "Yeti": 18
    };

    const HERO_ABBREVIATIONS = {
      "Barbarian King": "BK",
      "Archer Queen": "AQ",
      "Grand Warden": "GW",
      "Royal Champion": "RC",
      "Minion Prince": "MP",
      "Dragon Duke": "DD"
    };

    const EQUIPMENT_ABBREVIATIONS = {
      "Barbarian Puppet": "BP",
      "Rage Vial": "RV",
      "Archer Puppet": "AP",
      "Invisibility Vial": "IV",
      "Eternal Tome": "ET",
      "Life Gem": "LG",
      "Seeking Shield": "SS",
      "Royal Gem": "RG",
      "Earthquake Boots": "EB",
      "Hog Rider Puppet": "HRP",
      "Giant Gauntlet": "GG",
      "Vampstache": "VS",
      "Haste Vial": "HV",
      "Rocket Spear": "RS",
      "Spiky Ball": "SB",
      "Frozen Arrow": "FA",
      "Monolith Arrow": "MA",
      "Giant Arrow": "GA",
      "Heroic Torch": "HT",
      "Healer Puppet": "HeP",
      "Fireball": "FB",
      "Rage Gem": "RG",
      "Snake Bracelet": "SnB",
      "Healing Tome": "HT",
      "Dark Crown": "DC",
      "Magic Mirror": "MM",
      "Electro Boots": "EB",
      "Lavaloon Puppet": "LP",
      "Henchmen Puppet": "HP",
      "Dark Orb": "DO",
      "Metal Pants": "MP",
      "Noble Iron": "NI",
      "Action Figure": "AF",
      "Meteor Staff": "MS",
      "Frost Flake": "FF",
      "Stick Horse": "SH",
      "Fire Heart": "FH",
      "Rocket Backpack": "RB",
      "Stun Blaster": "StB",
      "Flame Blower": "FBw",
      "Electro Fangs": "EF"
    };

    function initials(text) {
      return String(text || '')
        .split(/[^A-Za-z0-9]+/)
        .filter(Boolean)
        .map(part => part[0].toUpperCase())
        .join('');
    }

    function shortSpellName(name) {
      return String(name || '').replace(/ Spell$/, '');
    }

    function setFilterMode(mode) {
      filterMode = mode;
      filterEquipmentTab.classList.toggle('active', mode === 'equipment');
      filterPlayerTab.classList.toggle('active', mode === 'player');
      filterEquipmentPane.classList.toggle('hidden', mode !== 'equipment');
      filterPlayerPane.classList.toggle('hidden', mode !== 'player');
      if (mode === 'player') playerSearchEl.focus();
    }

    function renderEquipmentFilter() {
      const items = [...new Set((window.siteData?.groups || []).flatMap(group => (group.players || []).flatMap(player => player.best_attack?.armyDecoded?.equipment || [])))]
        .filter(isEpicEquipment)
        .sort((a, b) => a.localeCompare(b));
      equipmentFilterGridEl.innerHTML = items.map(name => `<button class="group-btn ${ownedEpicEquipment.has(name) ? 'active' : ''}" data-equipment="${name}" type="button">${name}</button>`).join('');
      equipmentSummaryEl.textContent = ownedEpicEquipment.size ? `${ownedEpicEquipment.size} selected` : 'Select the equipment you own to glow matching armies.';
      equipmentFilterGridEl.querySelectorAll('[data-equipment]').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.getAttribute('data-equipment');
          if (ownedEpicEquipment.has(name)) ownedEpicEquipment.delete(name); else ownedEpicEquipment.add(name);
          renderEquipmentFilter();
          renderList();
          if (window.siteData?.groups?.length) renderGroup(window.siteData.groups[0], 0);
        });
      });
    }

    function renderSearchResults() {
      const query = (playerSearchEl.value || '').trim().toLowerCase();
      if (!query || !window.siteData?.groups?.length) {
        searchResultsEl.innerHTML = '';
        searchResultsEl.hidden = true;
        return;
      }
      const matches = [];
      window.siteData.groups.forEach((group, groupIndex) => {
        (group.players || []).forEach(player => {
          if (player.name.toLowerCase().includes(query) || player.tag.toLowerCase().includes(query)) {
            matches.push({ groupIndex, player });
          }
        });
      });
      searchResultsEl.hidden = false;
      searchResultsEl.innerHTML = matches.slice(0, 8).map(match => `
        <button class="search-result" type="button" data-group-index="${match.groupIndex}" data-player-tag="${match.player.tag}">
          ${match.player.name}
          <small>${match.player.tag} · ${window.siteData.groups[match.groupIndex].label}</small>
        </button>
      `).join('') || '<div class="empty">No players found.</div>';
      searchResultsEl.querySelectorAll('.search-result').forEach(btn => {
        btn.addEventListener('click', () => {
          const groupIndex = Number(btn.dataset.groupIndex);
          const playerTag = btn.dataset.playerTag;
          const group = window.siteData.groups[groupIndex];
          selectedPlayer = (group.players || []).find(p => p.tag === playerTag) || null;
          renderGroup(group, groupIndex);
        });
      });
    }

    function armyLinkUrl(armyShareCode) {
      if (!armyShareCode) return '';
      return `https://link.clashofclans.com/en?action=CopyArmy&army=${encodeURIComponent(armyShareCode)}`;
    }

    function youtubeSearchUrl(armyShareCode) {
      if (!armyShareCode) return '';
      return `https://www.youtube.com/results?search_query=${encodeURIComponent('army code clash of clans')}`;
    }

    function formatArmyLines(decoded, { shortHeroes = false } = {}) {
      const sections = decoded?.sections || {};
      const lines = [];

      if (sections.troops?.length) {
        const troops = [...sections.troops].sort((a, b) => {
          const wa = (TROOP_HOUSING_SPACE[a.name] || 0) * (a.count || 0);
          const wb = (TROOP_HOUSING_SPACE[b.name] || 0) * (b.count || 0);
          return wb - wa || a.name.localeCompare(b.name);
        });
        lines.push(`Troops: ${troops.map(entry => `${entry.count} ${entry.name}`).join(', ')}`);
      }

      const cc = [...(sections.clanCastleTroops || []), ...(sections.reinforcements || [])];
      if (cc.length) {
        lines.push(`Clan Castle: ${cc.map(entry => `${entry.count} ${entry.name}`).join(', ')}`);
      }

      const spells = [...(sections.spells || []), ...(sections.clanCastleSpells || [])];
      if (spells.length) {
        lines.push(`Spells: ${spells.map(entry => `${entry.count} ${shortSpellName(entry.name)}`).join(', ')}`);
      }

      if (sections.heroes?.length) {
        const heroLines = sections.heroes.map(hero => {
          if (shortHeroes) {
            const heroShort = HERO_ABBREVIATIONS[hero.name] || initials(hero.name);
            const equip = (hero.equipment || [])
              .map(piece => EQUIPMENT_ABBREVIATIONS[piece.name] || initials(piece.name))
              .filter(Boolean)
              .slice(0, 2);
            return equip.length ? `${heroShort} (${equip.join(', ')})` : heroShort;
          }

          const equip = (hero.equipment || []).map(piece => piece.name).filter(Boolean);
          const pet = (hero.pets || []).map(piece => piece.name).filter(Boolean);
          const extra = [];
          if (equip.length) extra.push(equip.join(', '));
          if (pet.length) extra.push(`pet: ${pet.join(', ')}`);
          return extra.length ? `${hero.name} (${extra.join('; ')})` : hero.name;
        });

        lines.push('Heroes:');
        lines.push(...heroLines);
      }

      return lines;
    }

    function getArmyEpicEquipmentNames(decoded) {
      const sections = decoded?.sections || {};
      const names = [];
      for (const hero of sections.heroes || []) {
        for (const piece of hero.equipment || []) {
          if (piece?.name && isEpicEquipment(piece.name)) names.push(piece.name);
        }
      }
      return [...new Set(names)];
    }

    function armyMatchesOwnedEquipment(decoded) {
      const requiredEpicEquipment = getArmyEpicEquipmentNames(decoded);
      return requiredEpicEquipment.length > 0 && requiredEpicEquipment.every(name => ownedEpicEquipment.has(name));
    }

    function renderArmyBlock(fullArmy) {
      const lines = formatArmyLines(fullArmy);
      const troops = lines.find(line => line.startsWith('Troops: ')) || 'Troops: none';
      const spells = lines.find(line => line.startsWith('Spells: ')) || 'Spells: none';
      const heroStart = lines.indexOf('Heroes:');
      const heroes = heroStart >= 0 ? lines.slice(heroStart + 1) : [];
      const link = fullArmy?.raw ? armyLinkUrl(fullArmy.raw) : '';
      const youtubeLink = fullArmy?.raw ? youtubeSearchUrl(fullArmy.raw) : '';
      armyBlockEl.className = 'army-block';
      armyBlockEl.innerHTML = `
        <div class="army-chip"><strong>Troops</strong>${troops.replace(/^Troops: /, '')}</div>
        <div class="army-chip"><strong>Spells</strong>${spells.replace(/^Spells: /, '')}</div>
        <div class="army-chip"><strong>Heroes</strong>${heroes.length ? heroes.map(line => `<span class="hero-line">${line}</span>`).join('') : '<span class="hero-line">None</span>'}</div>
        ${link ? `<a class="army-link" href="${link}" target="_blank" rel="noreferrer">Open army link</a>` : ''}
        ${youtubeLink ? `<a class="army-link" href="${youtubeLink}" target="_blank" rel="noreferrer">Search YouTube for this army</a>` : ''}
      `;
    }

    function renderEquipmentFilter() {
      const equipmentNames = [...new Set((window.siteData.groups || []).flatMap(group => (group.players || []).flatMap(player => getArmyEpicEquipmentNames(player.best_attack?.armyDecoded))))];
      if (!equipmentNames.length) {
        equipmentFilterGridEl.innerHTML = "<span class=\"equipment-summary\">No epic equipment found in this day's armies.</span>";
        equipmentSummaryEl.textContent = 'Only equipment that appears in an army is shown here.';
        return;
      }

      equipmentFilterGridEl.innerHTML = EPIC_EQUIPMENT_GROUPS.map(group => `<div class="equipment-group">${group.map(name => `<button class="equipment-pill ${ownedEpicEquipment.has(name) ? 'active' : ''}" type="button" data-equipment="${name}">${name}</button>`).join('')}</div>`).join('');
      equipmentFilterGridEl.querySelectorAll('.equipment-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.equipment;
          if (!name) return;
          if (ownedEpicEquipment.has(name)) ownedEpicEquipment.delete(name);
          else ownedEpicEquipment.add(name);
          renderEquipmentFilter();
          renderList();
          if (window.siteData.groups.length) {
            const activeBtn = listEl.querySelector('.group-btn.active') || listEl.querySelector('.group-btn');
            if (activeBtn) renderGroup(window.siteData.groups[Number(activeBtn.dataset.index)], Number(activeBtn.dataset.index));
            else {
              titleEl.textContent = 'No groups match';
              subEl.textContent = 'Try clearing some equipment filters.';
              bodyEl.innerHTML = '';
            }
          }
        });
      });

      equipmentSummaryEl.textContent = ownedEpicEquipment.size
        ? `${ownedEpicEquipment.size} epic equipment selected. Use these selections to filter which armies show.`
        : 'Select epic equipment to filter the armies shown.';
    }

    function renderGroup(group, index) {
      titleEl.textContent = selectedPlayer ? `${selectedPlayer.name} · ${group.label}` : group.label;
      subEl.textContent = selectedPlayer ? `Tag ${selectedPlayer.tag} · ${group.stats.avg_stars.toFixed(2)} avg stars · ${group.stats.avg_destruction.toFixed(1)}% avg destruction` : `Avg stars ${group.stats.avg_stars.toFixed(2)} · Avg destruction ${group.stats.avg_destruction.toFixed(1)}% · ${group.uniqueUsers} players · ${group.count} attacks`;
      countEl.textContent = `${index + 1} of ${window.siteData.groups.length}`;
      renderArmyBlock(selectedPlayer?.best_attack || group.example);

      const rows = group.players
        .filter(player => {
          const matches = armyMatchesOwnedEquipment(player.best_attack?.armyDecoded);
          return ownedEpicEquipment.size ? matches : true;
        })
        .filter(player => !selectedPlayer || player.tag === selectedPlayer.tag)
        .map(player => {
          const matched = armyMatchesOwnedEquipment(player.best_attack?.armyDecoded);
          return `<tr class="army-row ${matched ? 'matching' : ''}">
            <td>
              <div class="player-name">${player.name}</div>
              <div class="tag">${player.tag}</div>
            </td>
            <td class="army">
              ${formatArmyLines(player.best_attack.armyDecoded, { shortHeroes: true }).map(line => `<div>${line}</div>`).join('')}
              <div class="army-links">
                ${player.best_attack.armyShareCode ? `<a class="army-link" href="${armyLinkUrl(player.best_attack.armyShareCode)}" target="_blank" rel="noreferrer">Open army link</a>` : ''}
                ${player.best_attack.armyShareCode ? `<a class="army-link" href="${youtubeSearchUrl(player.best_attack.armyShareCode)}" target="_blank" rel="noreferrer">Search YouTube for this army</a>` : ''}
              </div>
            </td>
            <td>${player.attack_count}</td>
            <td>${player.stats.avg_stars.toFixed(2)}</td>
            <td>${player.stats.avg_destruction.toFixed(1)}%</td>
          </tr>`;
        }).join('');
      bodyEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Full army</th>
              <th>Attacks</th>
              <th>Avg stars</th>
              <th>Avg destruction</th>
            </tr>
          </thead>
          <tbody>
            ${rows || '<tr><td colspan="5" class="error">No armies match the selected equipment.</td></tr>'}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
